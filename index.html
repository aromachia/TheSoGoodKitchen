<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>便當訂餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-section { display: none; }
        .loading { pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-indigo-600 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <h1 class="font-bold text-lg tracking-wide">🍱 線上訂餐系統</h1>
        <button onclick="toggleView()" id="viewToggleBtn" class="bg-indigo-500 px-4 py-1.5 rounded-full text-sm font-medium border border-indigo-400 active:bg-indigo-700">管理後台</button>
    </nav>

    <section id="customerView" class="p-4 pb-32 max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-gray-100">
            <h2 class="text-gray-800 font-bold text-xl mb-4 border-b pb-2">填寫資料</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-sm text-gray-500 ml-1">訂餐人姓名</label>
                    <input type="text" id="custName" placeholder="請輸入姓名" class="w-full border-gray-200 border p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-gray-50">
                </div>
                <div>
                    <label class="text-sm text-gray-500 ml-1">聯絡電話</label>
                    <input type="tel" id="custPhone" placeholder="請輸入電話" class="w-full border-gray-200 border p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-gray-50">
                </div>
                <div class="flex gap-6 py-2">
                    <label class="flex items-center font-medium text-gray-700 cursor-pointer">
                        <input type="radio" name="dType" value="自取" checked class="w-5 h-5 mr-2 accent-indigo-600"> 自取
                    </label>
                    <label class="flex items-center font-medium text-gray-700 cursor-pointer">
                        <input type="radio" name="dType" value="外送" class="w-5 h-5 mr-2 accent-indigo-600"> 外送
                    </label>
                </div>
                <div>
                    <label class="text-sm text-gray-500 ml-1">備註</label>
                    <textarea id="custNote" placeholder="例如：少飯、不加蔥、半糖..." class="w-full border-gray-200 border p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-gray-50 h-24"></textarea>
                </div>
            </div>
        </div>

        <div id="menuContainer" class="space-y-6">
            </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md p-4 shadow-[0_-4px_15px_rgba(0,0,0,0.08)] border-t flex justify-between items-center z-40">
            <div>
                <p class="text-gray-400 text-xs font-medium">應付金額</p>
                <p class="text-3xl font-black text-red-500">$<span id="totalAmount">0</span></p>
            </div>
            <button onclick="submitOrder(event)" id="submitBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">確認送出</button>
        </div>
    </section>

    <section id="adminView" class="p-4 hidden-section max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-gray-100">
            <h2 class="text-lg font-bold mb-4 text-indigo-900">⚙️ 品項管理</h2>
            <div class="space-y-3">
                <input type="text" id="newCategory" placeholder="大項目 (如: 正常三菜)" class="w-full border p-3 rounded-xl bg-gray-50">
                <input type="text" id="newItemName" placeholder="品名" class="w-full border p-3 rounded-xl bg-gray-50">
                <input type="number" id="newItemPrice" placeholder="價格" class="w-full border p-3 rounded-xl bg-gray-50">
                <button onclick="addItem()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">新增至菜單</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100 overflow-x-auto">
            <h2 class="text-lg font-bold mb-4 text-indigo-900 font-bold">📊 本日點餐統計 (預覽)</h2>
            <table class="w-full text-left text-sm">
                <thead>
                    <tr class="text-gray-400 border-b">
                        <th class="pb-2">品項名稱</th>
                        <th class="pb-2 text-right">數量</th>
                    </tr>
                </thead>
                <tbody id="adminStatBody" class="divide-y">
                    </tbody>
            </table>
            <p class="text-xs text-gray-400 mt-4 text-center">※ 資料以 Google 試算表內容為準</p>
        </div>
    </section>

    <script>
        const SCRIPT_URL = "
